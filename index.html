<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Khiển & Giám Sát Nhà Kính</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .sensor-val { font-size: 1.8rem; font-weight: bold; }
        .status-badge { font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light">
<div class="container my-4">
    <h2 class="text-center text-success mb-4">Hệ Thống Quản Lý Nhà Kính Thông Minh</h2>

    <div class="row text-center mb-4">
        <div class="col-md-3 mb-2">
            <div class="card p-3 bg-white shadow-sm border-danger">
                <div class="text-danger fw-bold">Nhiệt Độ Khí</div>
                <div class="sensor-val" id="txtTemp">-- °C</div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card p-3 bg-white shadow-sm border-primary">
                <div class="text-primary fw-bold">Độ Ẩm Đất</div>
                <div class="sensor-val" id="txtHumiSoil">-- %</div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card p-3 bg-white shadow-sm border-warning">
                <div class="text-warning fw-bold">Ánh Sáng</div>
                <div class="sensor-val" id="txtLight">-- %</div>
            </div>
        </div>
        <div class="col-md-3 mb-2">
            <div class="card p-3 bg-white shadow-sm border-info">
                <div class="text-info fw-bold">Mức Độ Mưa</div>
                <div class="sensor-val" id="txtRain">-- %</div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card p-4 shadow-sm h-100 border-success">
                <h5 class="card-title text-success fw-bold">Chế Độ Hệ Thống</h5>
                <hr>
                <div class="d-flex justify-content-between align-items-center my-3">
                    <span class="fw-bold">Chế độ hiện tại:</span>
                    <span id="txtModeState" class="badge bg-secondary p-2 fs-6">Đang cập nhật...</span>
                </div>
                <button id="btnToggleMode" class="btn btn-success w-100 fw-bold py-2" onclick="switchMode()">CHUYỂN SANG THỦ CÔNG</button>
            </div>
        </div>

        <div class="col-md-8 mb-3">
            <div class="card p-4 shadow-sm h-100">
                <h5 class="card-title text-dark fw-bold">Điều Khiển & Trạng Thái Thiết Bị</h5>
                <hr>
                <div class="row g-3 text-center">
                    <div class="col-6 col-sm-3">
                        <p class="mb-1 fw-bold">Quạt Gió</p>
                        <span id="badge_quat" class="badge bg-secondary mb-2 d-block status-badge">TẮT</span>
                        <button class="btn btn-outline-danger btn-sm w-100 ctrl-btn" onclick="sendRelay('QUAT', 1)" disabled>Bật</button>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-1 ctrl-btn" onclick="sendRelay('QUAT', 0)" disabled>Tắt</button>
                    </div>
                    <div class="col-6 col-sm-3">
                        <p class="mb-1 fw-bold">Máy Sưởi</p>
                        <span id="badge_suoi" class="badge bg-secondary mb-2 d-block status-badge">TẮT</span>
                        <button class="btn btn-outline-danger btn-sm w-100 ctrl-btn" onclick="sendRelay('SUOI', 1)" disabled>Bật</button>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-1 ctrl-btn" onclick="sendRelay('SUOI', 0)" disabled>Tắt</button>
                    </div>
                    <div class="col-6 col-sm-3">
                        <p class="mb-1 fw-bold">Máy Bơm</p>
                        <span id="badge_bom" class="badge bg-secondary mb-2 d-block status-badge">TẮT</span>
                        <button class="btn btn-outline-danger btn-sm w-100 ctrl-btn" onclick="sendRelay('BOM', 1)" disabled>Bật</button>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-1 ctrl-btn" onclick="sendRelay('BOM', 0)" disabled>Tắt</button>
                    </div>
                    <div class="col-6 col-sm-3">
                        <p class="mb-1 fw-bold">Đèn Lưới</p>
                        <span id="badge_den" class="badge bg-secondary mb-2 d-block status-badge">TẮT</span>
                        <button class="btn btn-outline-danger btn-sm w-100 ctrl-btn" onclick="sendRelay('DEN', 1)" disabled>Bật</button>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-1 ctrl-btn" onclick="sendRelay('DEN', 0)" disabled>Tắt</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card p-4 shadow-sm">
        <h5 class="card-title text-secondary">Đồ Thị Giám Sát Tiến Trình Thời Gian Thực</h5>
        <div style="position: relative; height:35vh;">
            <canvas id="realtimeChart"></canvas>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentMode = 1; 

    const ctx = document.getElementById('realtimeChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Nhiệt độ (°C)', data: [], borderColor: '#dc3545', tension: 0.1, fill: false },
                { label: 'Độ ẩm đất (%)', data: [], borderColor: '#0d6efd', tension: 0.1, fill: false },
                { label: 'Ánh sáng (%)', data: [], borderColor: '#ffc107', tension: 0.1, fill: false }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } }
    });

    socket.on('sensorData', (data) => {
        document.getElementById('txtTemp').innerText = data.temp + " °C";
        document.getElementById('txtHumiSoil').innerText = data.humiSoil + " %";
        document.getElementById('txtLight').innerText = data.light + " %";
        document.getElementById('txtRain').innerText = data.rain + " %";

        currentMode = data.mode;
        const modeBadge = document.getElementById('txtModeState');
        const modeBtn = document.getElementById('btnToggleMode');
        const ctrlButtons = document.querySelectorAll('.ctrl-btn');

        if (currentMode === 1) {
            modeBadge.innerText = "TỰ ĐỘNG (AUTO)";
            modeBadge.className = "badge bg-success p-2 fs-6";
            modeBtn.innerText = "CHUYỂN SANG THỦ CÔNG";
            modeBtn.className = "btn btn-warning w-100 fw-bold py-2";
            ctrlButtons.forEach(btn => btn.disabled = true);
        } else {
            modeBadge.innerText = "THỦ CÔNG (MANUAL)";
            modeBadge.className = "badge bg-warning p-2 text-dark fs-6";
            modeBtn.innerText = "CHUYỂN SANG TỰ ĐỘNG";
            modeBtn.className = "btn btn-success w-100 fw-bold py-2";
            ctrlButtons.forEach(btn => btn.disabled = false);
        }

        updateBadge('badge_quat', data.st_quat);
        updateBadge('badge_suoi', data.st_suoi);
        updateBadge('badge_bom', data.st_bom);
        updateBadge('badge_den', data.st_den);

        const timeNow = new Date().toLocaleTimeString();
        if (chart.data.labels.length > 10) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
            chart.data.datasets[1].data.shift();
            chart.data.datasets[2].data.shift();
        }
        chart.data.labels.push(timeNow);
        chart.data.datasets[0].data.push(data.temp);
        chart.data.datasets[1].data.push(data.humiSoil);
        chart.data.datasets[2].data.push(data.light);
        chart.update();
    });

    function updateBadge(id, state) {
        const el = document.getElementById(id);
        if(state === 1) { el.innerText = "BẬT"; el.className = "badge bg-danger mb-2 d-block status-badge"; }
        else { el.innerText = "TẮT"; el.className = "badge bg-secondary mb-2 d-block status-badge"; }
    }

    function switchMode() {
        let targetMode = (currentMode === 1) ? 0 : 1;
        socket.emit('controlDevice', { "mode": targetMode });
    }

    function sendRelay(deviceName, stateVal) {
        if(currentMode === 1) return; 
        socket.emit('controlDevice', { "device": deviceName, "state": stateVal });
    }
</script>
</body>
</html>
